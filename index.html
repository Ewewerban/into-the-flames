<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into The Flames - Official Website</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #141923;
            --card-border: #2a3547;
            --primary-color: #ff4c29;
            --primary-hover: #ff683b;
            --text-main: #f5f5f5;
            --text-muted: #8fa0b7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero Section */
        header {
            position: relative;
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, rgba(11, 12, 16, 0.4) 0%, rgba(11, 12, 16, 1) 100%),
                        radial-gradient(circle, rgba(255, 76, 41, 0.12) 0%, rgba(0,0,0,0) 70%);
            border-bottom: 2px solid var(--primary-color);
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 76, 41, 0.7), 0 0 20px rgba(255, 76, 41, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 25px;
            max-width: 600px;
        }

        /* Support Button */
        .btn-support {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff4c29 0%, #ff2a00 100%);
            color: #fff;
            text-decoration: none;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 76, 41, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-support:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 76, 41, 0.6);
        }

        /* Main Container */
        .chapters-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 2px;
            color: #fff;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--primary-color);
            margin: 10px auto 0;
            box-shadow: 0 0 8px var(--primary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Chapter Card */
        .chapter-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 460px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .chapter-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .chapter-info h3 {
            font-size: 1.6rem;
            margin-top: 15px;
            margin-bottom: 12px;
            color: #fff;
        }

        .chapter-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Minecraft-styled Launcher Section */
        .mc-launcher-widget {
            background-color: #1a222f;
            border: 2px solid #2d3748;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .mc-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 10px;
        }

        .mc-icon {
            font-size: 1.8rem;
            background: #232d3f;
            padding: 5px 10px;
            border-radius: 6px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .mc-meta {
            text-align: left;
        }

        .mc-version-name {
            font-weight: bold;
            color: #fff;
            font-size: 0.95rem;
        }

        .mc-version-tag {
            font-size: 0.75rem;
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 2px;
        }

        /* Dropdown Container */
        .dropdown-container {
            position: relative;
            margin-bottom: 15px;
        }

        .mc-dropdown {
            background-color: #0f131a;
            border: 1px solid #3e4e68;
            color: #fff;
            padding: 10px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
